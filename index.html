<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">

    <!-- Favicon -->
    <link rel="icon" href="assets/logo/logo.png">

    <title>Spotify - Web Player</title>

    <!-- CSS -->
    <link rel="stylesheet" href="project.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="main">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="nav">
                <div class="nav-option" style="opacity: 1;">
                    <i class="fa-solid fa-house"></i>
                    <a href="#">Home</a>
                </div>
                <div class="nav-option">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <a href="#">Search</a>
                </div>
            </div>

            <div class="library">
                <div class="option">
                    <div class="lib-option nav-option">
                        <img src="assets/icons/library_icon.png">
                        <a href="#">Your Library</a>
                    </div>

                    <div class="icons">
                        <i class="fa-solid fa-plus"></i>
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                </div>

                <div class="lib-box">
                    <div class="box">
                        <p class="box-p1">Create your first playlist</p>
                        <p class="box-p2">it's easy, we'll help you</p>
                        <button class="badge">Create playlist</button>
                    </div>

                    <div class="box">
                        <p class="box-p1">Let's find some podcasts</p>
                        <p class="box-p2">We'll keep you updated</p>
                        <button class="badge">Browse Podcasts</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">

            <div class="sticky-nav">
                <div class="sticky-nav-icons">
                    <img src="assets/icons/backward_icon.png">
                    <img src="assets/icons/forward_icon.png" class="hide">
                </div>

                <div class="sticky-nav-options">
                    <button class="badge nav-item hide">Explore Premium</button>
                    <button class="badge nav-item dark-badge">
                        <i class="fa-regular fa-circle-down"></i> Install App
                    </button>
                    <i class="fa-regular fa-user nav-item"></i>
                </div>
            </div>

            <!-- Recently Played -->
            <h2>Recently Played</h2>
            <div class="card-container">
                <div class="card">
                    <img src="assets/image/card1img.jpeg" class="card-img">
                    <p class="card-title">Top 50 - Global</p>
                    <p class="card-info">Most played songs...</p>
                </div>
            </div>

            <!-- Trending -->
            <h2>Trending now</h2>
            <div class="card-container">
                <div class="card"><img src="assets/image/card2img.jpeg" class="card-img"></div>
                <div class="card"><img src="assets/image/card3img.jpeg" class="card-img"></div>
                <div class="card"><img src="assets/image/card4img.jpeg" class="card-img"></div>
                <div class="card"><img src="assets/image/card3img.jpeg" class="card-img"></div>
                <div class="card"><img src="assets/image/card4img.jpeg" class="card-img"></div>
            </div>

            <!-- Charts -->
            <h2>Featured Charts</h2>
            <div class="card-container">
                <div class="card"><img src="assets/image/card5img.jpeg" class="card-img"></div>
                <div class="card"><img src="assets/image/card6img.jpeg" class="card-img"></div>
                <div class="card"><img src="assets/image/card1img.jpeg" class="card-img"></div>
            </div>

            <div class="footer">
                <div class="line"></div>
            </div>

        </div>

        <!-- Music Player -->
        <div class="music-player">

            <div class="album"></div>

            <div class="player">
                <div class="player-controls">
                    <img src="assets/logo/player_icon1.png" class="player-control-icon">
                    <img src="assets/logo/player_icon2.png" class="player-control-icon">
                    <img src="assets/logo/player_icon3.png" class="player-control-icon">
                    <img src="assets/logo/player_icon4.png" class="player-control-icon">
                    <img src="assets/logo/player_icon5.png" class="player-control-icon">
                </div>

                <div class="playback-bar">
                    <span>00:00</span>
                    <input type="range" class="progress-bar">
                    <span>3:33</span>
                </div>
            </div>

            <div class="controls"></div>

        </div>

    </div>
</body>

</html>
